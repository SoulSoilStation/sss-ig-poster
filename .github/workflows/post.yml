name: Instagram自動投稿

on:
  schedule:
    - cron: '0 23 * * *'   # 08:00 JST
  workflow_dispatch:         # 手動実行ボタン

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: Git ユーザー設定
        run: |
          git config user.name "soulsoil-bot"
          git config user.email "soulsoil-bot@users.noreply.github.com"

      - name: 投稿実行
        env:
          IG_APP_ID: ${{ secrets.IG_APP_ID }}
          IG_APP_SECRET: ${{ secrets.IG_APP_SECRET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python poster.py
